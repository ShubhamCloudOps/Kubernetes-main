apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: myapp-rollout
spec:
  replicas: 5

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: nginx:1.25   # change version to trigger rollout
          ports:
            - containerPort: 80

  strategy:
    canary:
      canaryService: myapp-canary
      stableService: myapp-stable

      steps:
        - setWeight: 10
        - pause: {duration: 30s}

        - setWeight: 30
        - pause: {duration: 60s}

        - setWeight: 60
        - pause: {duration: 90s}

        - setWeight: 100
